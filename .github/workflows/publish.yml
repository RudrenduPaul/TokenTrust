name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    name: npm publish (on tagged release)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure npm >= 11.5.1 (required for npm OIDC trusted publishing)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test (with coverage thresholds)
        run: npm run test:coverage

      - name: Security audit
        run: npm run audit

      - name: Build
        run: npm run build

      # Once this repo+workflow is registered as a trusted publisher on npmjs.com,
      # npm (>=11.5.1, Node >=22.14.0) auto-detects the GitHub Actions OIDC context
      # from the id-token: write permission above and authenticates via OIDC,
      # taking priority over NODE_AUTH_TOKEN. NPM_TOKEN is kept as a fallback below
      # in case trusted-publisher registration is not yet completed or is misconfigured.
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
